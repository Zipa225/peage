<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié - Pont a peage</title>
    <!--Material cdn-->
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp">
    <!--Style-->
    <link rel="stylesheet" href="../Style/style.css">
    <link rel="stylesheet" href="login.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-content">
            <div class="logo">
                <img src="../images/pngwing.com.png" alt="Logo">
                <h2>S <span class="danger">M</span></h2>
            </div>
            <h2>Mot de passe oublié ?</h2>
            <p class="text-muted">Entrez votre adresse email pour recevoir un lien de réinitialisation.</p>
            
            <form action="login.html">
                <div class="input-group">
                    <span class="material-icons-sharp">email</span>
                    <input type="email" placeholder="Adresse Email" required>
                </div>
                
                <button type="submit" class="btn-login">Envoyer le lien</button>

                <div class="register-link">
                    <p><a href="login.html" class="primary">Retour à la connexion</a></p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
