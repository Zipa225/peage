<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Pont a peage</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp">
    <link rel="stylesheet" href="../Style/login.css">
    <link rel="stylesheet" href="../Style/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-content">
            <div class="logo">
                <img src="../images/pngwing.com.png" alt="Logo">
                <h2>S <span class="danger">M</span></h2>
            </div>
            <h2>Bienvenue</h2>
            <p class="text-muted">Connectez-vous à votre compte</p>
            
            <form action="index.html">
                <div class="input-group">
                    <span class="material-icons-sharp">person</span>
                    <input type="text" placeholder="Nom d'utilisateur" required>
                </div>
                <div class="input-group">
                    <span class="material-icons-sharp">lock</span>
                    <input type="password" placeholder="Mot de passe" required>
                </div>
                
                <div class="options">
                    <label><input type="checkbox"> Se souvenir de moi</label>
                    <a href="forgot-password.html" class="primary">Mot de passe oublié ?</a>
                </div>
                
                <button type="submit" class="btn-login">Se Connecter</button>

                <div class="register-link">
                    <p>Vous n'avez pas de compte ? <a href="register.html" class="primary">Créer un compte</a></p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
